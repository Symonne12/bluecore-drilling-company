<!DOCTYPE html>
<html>
<head>
    <title>Booking - Bluecore Drilling Company</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="booking"  style="background-image: url('images/pic1.jfif');
background-size: cover;
background-position: center;">

<header>
    <h1>Book a Service</h1>
    <nav>
        <a href="index.html">Home</a>
         <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact Us</a>
    </nav>
</header>

<section>
    <form id="bookingForm">
        <label>Full Name:</label>
        <input type="text" required>

        <label>Phone Number:</label>
        <input type="tel" required>

        <label>Email:</label>
        <input type="email" required>

        <label>Select Borehole Type:</label>
        <select required>
            <option value="">--Choose--</option>
            <option>Manual Borehole</option>
            <option>Automatic (Solar Powered)</option>
        </select>

        <button type="submit">Submit</button>
    </form>

    <p id="message"></p>
</section>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();
    document.getElementById("message").innerText = "Booking submitted successfully!";
});
</script>

<footer>
    <p>&copy; 2026 Bluecore Drilling Company</p>
</footer>

</body>
</html>
